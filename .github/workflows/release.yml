# Verifies tagged builds and uploads the addon zip as a CI artifact.
# GitHub Releases with notes + the same zip are created by `release.ps1` locally (uses `gh release create` + CHANGELOG section).
# This workflow avoids duplicating releases while still catching broken publishes on tag push.

name: Release verify (tag)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Debug Attach Service (win-x64, matches release.ps1)
        run: |
          dotnet publish DebugAttachService/DebugAttachService.csproj \
            -c Release \
            -r win-x64 \
            --self-contained false \
            -o ExternalDebugAttachPlugin/addons/external_debug_attach/bin

      - name: Zip addon folder
        run: |
          cd ExternalDebugAttachPlugin/addons
          zip -r ../../../external_debug_attach_plugin.zip external_debug_attach

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: external_debug_attach_plugin
          path: external_debug_attach_plugin.zip
